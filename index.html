<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVA SENA – Fichas Complementarias 2026</title>
<style>
  :root{
    --navy:#21295c;
    --orange:#f5821f;
    --orange-dark:#e06e0f;
    --pill-bg:#eef0fb;
    --pill-text:#3b4a9b;
    --text:#21295c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:var(--navy);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 12px;
  }
  .card{
    background:#fff;
    width:100%;
    max-width:760px;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
  }
  .topbar{
    background:linear-gradient(135deg,var(--navy) 0%, #2c3470 100%);
    color:#fff;
    padding:18px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .topbar h1{ font-size:18px; margin:0; font-weight:700; }
  .badge-orange{
    background:var(--orange); color:#fff; font-weight:700; font-size:13px;
    padding:6px 14px; border-radius:20px; white-space:nowrap;
  }
  .content{ padding:28px 30px; min-height:260px; }
  .pills{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .pill{ font-size:13px; font-weight:600; padding:6px 14px; border-radius:20px; }
  .pill.purple{ background:var(--pill-bg); color:var(--pill-text);}
  .pill.orange{ background:#fdebd9; color:var(--orange-dark);}
  h2.item-title{ color:var(--navy); font-size:24px; margin:0 0 16px 0; }
  .quote-box{
    background:#f4f5fa; border-left:4px solid var(--navy); padding:14px 18px;
    color:#333; font-size:15px; line-height:1.5; margin-bottom:18px; border-radius:4px;
  }
  .images-row{ display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .images-row img{
    flex:1 1 45%; min-width:160px; max-width:48%; border-radius:8px;
    border:1px solid #ddd; display:block;
  }
  .question-label{ display:flex; align-items:center; gap:8px; font-weight:700; color:var(--navy); font-size:16px; margin-bottom:14px; }
  .question-label .q-mark{ color:#e04545; font-weight:800; }
  .options{ display:flex; flex-direction:column; gap:10px; }
  .option{
    text-align:left; background:#f4f5fb; border:1px solid #d8dcef; border-radius:8px;
    padding:13px 16px; font-size:15px; color:var(--text); cursor:pointer; transition:.15s;
  }
  .option:hover{ background:#e9ebf8; }
  .option.correct{ background:#e3f6e8; border-color:#4caf50; color:#1f6b2c;}
  .option.wrong{ background:#fbe7e7; border-color:#e05656; color:#9c2727;}
  .option:disabled{ cursor:default; }
  .feedback{ margin-top:14px; padding:12px 16px; border-radius:8px; font-size:14px; line-height:1.5; }
  .feedback.ok{ background:#e3f6e8; color:#1f6b2c; }
  .feedback.bad{ background:#fbe7e7; color:#9c2727; }
  .center-screen{ text-align:center; padding:20px 10px; }
  .center-screen h2{ color:var(--navy); font-size:30px; margin:10px 0 14px; }
  .center-screen p{ color:#444; font-size:15px; line-height:1.6; max-width:520px; margin:0 auto 22px; }
  .start-icon{
    width:160px; height:100px; margin:0 auto 18px; background:#fff; border:1px solid #ddd;
    border-radius:8px; position:relative; box-shadow:0 4px 10px rgba(0,0,0,.08);
  }
  .start-icon:after{ content:"❖"; color:#39a935; position:absolute; top:6px; right:10px; font-size:16px; }
  .btn{ border:none; cursor:pointer; font-weight:700; border-radius:8px; padding:13px 30px; font-size:15px; }
  .btn-orange{ background:var(--orange); color:#fff; }
  .btn-orange:hover{ background:var(--orange-dark); }
  .btn-navy{ background:var(--navy); color:#fff; }
  .btn-navy:disabled{ opacity:.4; cursor:not-allowed; }
  .footer{
    display:flex; align-items:center; justify-content:space-between; padding:16px 24px;
    border-top:1px solid #eee; flex-wrap:wrap; gap:10px;
  }
  .progress-center{ display:flex; align-items:center; gap:10px; font-size:14px; color:#555; }
  .score-chip{ background:#e3f6e8; color:#1f6b2c; font-weight:700; font-size:13px; padding:5px 10px; border-radius:6px; }
</style>
</head>

<script>
const TOTAL = QUESTIONS.length;
let current = -1; // -1 intro, TOTAL = end
let score = 0;
let answered = {};

const card = document.getElementById('card');

function imagesRowHtml(imgs){
  if(!imgs || !imgs.length) return '';
  return `<div class="images-row">${imgs.map(k=>`<img src="${IMG[k]}">`).join('')}</div>`;
}

function footerHtml(){
  return `
    <div class="footer">
      <button class="btn btn-navy" id="btnPrev" ${current<=0?'disabled':''}>◂ Anterior</button>
      <div class="progress-center">
        <span>Pregunta ${current+1} / ${TOTAL}</span>
        <span class="score-chip">✓ ${score} / ${TOTAL}</span>
      </div>
      <button class="btn btn-navy" id="btnNext">Siguiente ▸</button>
    </div>`;
}

function wireFooter(){
  document.getElementById('btnPrev').onclick = ()=>{ current--; render(); };
  document.getElementById('btnNext').onclick = ()=>{
    if(current+1 > TOTAL) return;
    current++; render();
  };
}

function render(){
  if(current === -1){ renderIntro(); return; }
  if(current === TOTAL){ renderEnd(); return; }
  renderQuestion(QUESTIONS[current]);
}

function renderIntro(){
  card.innerHTML = `
    <div class="topbar">
      <h1>AVA SENA – Fichas Complementarias</h1>
      <span class="badge-orange">2026</span>
    </div>
    <div class="content center-screen">
      <div class="start-icon"></div>
      <h2>Ambiente Virtual de Aprendizaje</h2>
      <p>Bienvenido/a a esta presentación interactiva. Identifica los errores en las fichas complementarias del SENA respondiendo cada pregunta.</p>
      <p>Tienes <b>${TOTAL} preguntas</b> de identificación de errores y casos.</p>
      <button class="btn btn-orange" id="btnStart">Iniciar ▸</button>
    </div>`;
  document.getElementById('btnStart').onclick = ()=>{ current=0; render(); };
}

function renderQuestion(q){
  card.innerHTML = `
    <div class="topbar">
      <h1>${q.item}${q.ficha && q.ficha !== '-' ? ' – Ficha '+q.ficha : ''}</h1>
      <span class="badge-orange">${q.tag}</span>
    </div>
    <div class="content">
      <div class="pills">
        ${q.ficha && q.ficha !== '-' ? `<span class="pill purple">Ficha No. ${q.ficha}</span>` : ''}
        <span class="pill orange">${q.tag}</span>
      </div>
      <h2 class="item-title">${q.item}</h2>
      <div class="quote-box">${q.text}</div>
      ${imagesRowHtml(q.imgs)}
      <div class="question-label"><span class="q-mark">?</span> De acuerdo con la información anterior, ¿cuál es la respuesta correcta?</div>
      <div class="options" id="optionsBox">
        ${q.options.map((opt,i)=>`<button class="option" data-i="${i}">${String.fromCharCode(65+i)}. ${opt}</button>`).join('')}
      </div>
      <div id="feedbackBox"></div>
    </div>
    ${footerHtml()}
  `;
  wireFooter();
  const optsBox = document.getElementById('optionsBox');
  if(answered[current] !== undefined){
    showAnswered(q);
  } else {
    optsBox.querySelectorAll('.option').forEach(btn=>{
      btn.onclick = ()=>{
        const i = parseInt(btn.dataset.i);
        answered[current] = i;
        if(i === q.correct) score++;
        showAnswered(q);
        document.querySelector('.score-chip').textContent = `✓ ${score} / ${TOTAL}`;
      };
    });
  }
}

function showAnswered(q){
  const chosen = answered[current];
  const optsBox = document.getElementById('optionsBox');
  optsBox.querySelectorAll('.option').forEach((btn,i)=>{
    btn.disabled = true;
    if(i === q.correct) btn.classList.add('correct');
    else if(i === chosen) btn.classList.add('wrong');
  });
  const ok = chosen === q.correct;
  document.getElementById('feedbackBox').innerHTML = `
    <div class="feedback ${ok?'ok':'bad'}">
      ${ok ? '✔ ¡Correcto! ' : '✘ No es el error principal. '} ${q.feedback}
    </div>`;
}

function renderEnd(){
  card.innerHTML = `
    <div class="topbar">
      <h1>AVA SENA – Fichas Complementarias</h1>
      <span class="badge-orange">2026</span>
    </div>
    <div class="content center-screen">
      <h2>¡Has finalizado!</h2>
      <p>Tu resultado: <b>${score} / ${TOTAL}</b> respuestas correctas en la identificación de errores.</p>
      <button class="btn btn-orange" id="btnRestart">Reiniciar ▸</button>
    </div>
    <div class="footer">
      <button class="btn btn-navy" id="btnPrev">◂ Anterior</button>
      <div class="progress-center">
        <span>Pregunta ${TOTAL} / ${TOTAL}</span>
        <span class="score-chip">✓ ${score} / ${TOTAL}</span>
      </div>
      <div style="width:110px;"></div>
    </div>
  `;
  document.getElementById('btnRestart').onclick = ()=>{ current=-1; score=0; answered={}; render(); };
  document.getElementById('btnPrev').onclick = ()=>{ current--; render(); };
}

render();
</script>
